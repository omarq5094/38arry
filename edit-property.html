<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>تعديل الإعلان</title><link rel="stylesheet" href="styles.css"/></head>
<body>
<header class="site-header"><div class="container header-grid"><div><h1>تعديل الإعلان</h1><p>عدّل بيانات إعلانك ثم أعد إرساله للمراجعة.</p></div><nav class="nav"><a href="my-properties.html">عقاراتي</a><a href="index.html">الرئيسية</a><button class="theme-toggle" data-theme-toggle type="button">🌙 Dark</button></nav></div></header>
<main class="container">
<div id="editStatus" class="status-box">جاري تحميل الإعلان...</div>
<form id="editPropertyForm" class="form-card hidden">
<input type="hidden" name="property_id"/>
<div id="currentImages" class="edit-images"></div>
<div class="form-grid">
<label>عنوان الإعلان<input name="title" required/></label>
<label>نوع العقار<select name="type" required><option value="">اختر</option><option value="villa">فيلا</option><option value="apartment">شقة</option><option value="land">أرض</option><option value="building">عمارة</option><option value="shop">محل</option></select></label>
<label>الغرض<select name="purpose" required><option value="">اختر</option><option value="sale">بيع</option><option value="rent">إيجار</option></select></label>
<label>المدينة<input name="city" required/></label><label>الحي<input name="district" required/></label>
<label>السعر<input name="price" required type="number" min="0"/></label><label class="inline-checkbox price-visibility-check"><input name="show_price" type="checkbox" value="yes"/><span><strong>اعرض السعر للعملاء</strong><small>إذا لم تُفعّل الخيار، سيظهر للعميل: السعر عند التواصل.</small></span></label><label>المساحة م²<input name="area" required type="number" min="0"/></label>
<label>عدد الغرف<input name="bedrooms" type="number" min="0"/></label><label>عدد دورات المياه<input name="bathrooms" type="number" min="0"/></label>
<label>رابط Google Maps<input name="map_url"/></label><label>Latitude<input name="latitude"/></label><label>Longitude<input name="longitude"/></label>
</div>
<label>الوصف<textarea name="description" rows="4"></textarea></label>
<label>صور إضافية<input name="images" type="file" accept="image/*" multiple/><small>الصور الجديدة تُضاف للصور الحالية. حذف الصور نضيفه لاحقًا.</small></label>
<button class="primary-btn" type="submit">حفظ وإعادة الإرسال للمراجعة</button>
<div id="editSubmitStatus" class="status-box hidden"></div>
</form></main>
<script src="theme.js"></script><script src="config.js"></script><script src="auth.js"></script><script src="edit-property.js"></script>
</body></html>
